# Lokální vývoj — MCP server bez HTTPS
#
# Použití:
#   docker compose up --build
#
# MCP endpoint: http://localhost:8000/mcp
# Health:       http://localhost:8000/health

services:
  czechmedmcp-server:
    build: .
    container_name: czechmedmcp-server
    ports:
      - "8000:8000"
    environment:
      - MCP_MODE=streamable_http
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - NCI_API_KEY=${NCI_API_KEY:-}
      - OPENFDA_API_KEY=${OPENFDA_API_KEY:-}
      - ONCOKB_TOKEN=${ONCOKB_TOKEN:-}
      - CBIO_TOKEN=${CBIO_TOKEN:-}
    volumes:
      - czechmedmcp-cache:/root/.cache/czechmedmcp
    restart: unless-stopped

volumes:
  czechmedmcp-cache:
    driver: local
